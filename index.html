<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PoolCare Pro - ניהול תחזוקה</title>
    
    <!-- ספריות חיצוניות -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.7/dayjs.min.js"></script>
    
    <!-- טעינת Firebase גרסת Compat ליציבות מקסימלית -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; touch-action: manipulation; background-color: #f8fafc; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        input { border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; width: 100%; font-size: 16px; text-align: right; }
        .btn-primary { background: #2563eb; color: white; border-radius: 14px; padding: 16px; font-weight: 700; width: 100%; transition: all 0.2s; border: none; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        .hidden { display: none; }
        #modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .section-title { font-weight: bold; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; margin-bottom: 12px; color: #1e3a8a; }
    </style>
</head>
<body class="text-slate-900 pb-10">

    <!-- מסך ראשי -->
    <div id="main-screen" class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-8 pt-6">
            <div>
                <h1 class="text-2xl font-black text-slate-900">הבריכות שלי</h1>
                <p id="today-date" class="text-blue-600 font-bold"></p>
            </div>
            <button onclick="openAddCustomerModal()" class="bg-blue-600 text-white w-14 h-14 rounded-full text-3xl shadow-xl flex items-center justify-center">+</button>
        </header>
        <div id="customer-list" class="space-y-4"></div>
    </div>

    <!-- מודאל הוספת לקוח -->
    <div id="modal-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-slate-800">הוספת לקוח חדש</h3>
            <div class="space-y-4">
                <input type="text" id="new-cust-name" placeholder="שם הלקוח">
                <input type="text" id="new-cust-city" placeholder="יישוב">
                <input type="tel" id="new-cust-phone" placeholder="מספר טלפון">
                <button onclick="saveNewCustomer()" class="btn-primary mt-4">שמור וסנכרן ☁️</button>
                <button onclick="closeModal()" class="w-full text-slate-400 py-2 font-bold">ביטול</button>
            </div>
        </div>
    </div>

    <!-- מסך טופס טיפול -->
    <div id="service-screen" class="max-w-md mx-auto p-4 hidden text-right">
        <button onclick="closeForm()" class="text-blue-600 font-bold mb-6 flex items-center gap-2">✕ ביטול וחזרה</button>
        <h2 id="current-customer-name" class="text-2xl font-black mb-8 text-slate-900"></h2>
        
        <div class="space-y-6">
            <!-- מועד הבא -->
            <section class="card p-6 bg-blue-50 border border-blue-100">
                <label class="block text-sm font-bold text-blue-800 mb-3 underline">📅 מועד טיפול הבא:</label>
                <input type="date" id="next_service_date" class="bg-white font-bold text-blue-900">
            </section>

            <!-- בדיקת ערכים -->
            <section class="card p-4 shadow-sm">
                <h3 class="section-title">📊 בדיקת ערכים (לפני)</h3>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" step="0.1" id="val_ph" placeholder="PH">
                    <input type="number" step="0.1" id="val_chlorine" placeholder="כלור">
                </div>
            </section>

            <button onclick="saveServiceReport()" class="btn-primary shadow-lg">סיים טיפול ועדכן ענן ☁️</button>
        </div>
    </div>

    <script>
        // --- הגדרות Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyByGzovNpq9WksV3Y_lLBAZC_I-NcLA8pA",
            authDomain: "poolcare-data.firebaseapp.com",
            projectId: "poolcare-data",
            storageBucket: "poolcare-data.firebasestorage.app",
            messagingSenderId: "618878936393",
            appId: "1:618878936393:web:0be324b60af54283cae698",
            databaseURL: "https://poolcare-data-default-rtdb.europe-west1.firebasedatabase.app/" 
        };

        // אתחול
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        const customersRef = db.ref('customers');

        let customers = [];
        let activeCustomerId = null;

        // פונקציית עזר לתאריך (שבועיים קדימה, דלוג על סופ"ש)
        function getSmartTwoWeeksDate() {
            let target = dayjs().add(14, 'day');
            if (target.day() === 5) target = target.add(2, 'day');
            else if (target.day() === 6) target = target.add(1, 'day');
            return target.format('YYYY-MM-DD');
        }

        // טעינת נתונים בזמן אמת מהענן
        customersRef.on('value', (snapshot) => {
            const data = snapshot.val();
            customers = data ? Object.keys(data).map(key => ({ firebaseId: key, ...data[key] })) : [];
            renderCustomers();
        }, (error) => {
            console.error("שגיאת קריאה מ-Firebase:", error);
        });

        function renderCustomers() {
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            const sorted = [...customers].sort((a, b) => dayjs(a.nextService).isAfter(dayjs(b.nextService)) ? 1 : -1);

            if (sorted.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 mt-10">אין לקוחות רשומים. לחצי על +.</p>';
                return;
            }

            sorted.forEach(c => {
                list.innerHTML += `
                    <div class="card p-5 border-r-8 border-blue-500 flex justify-between items-center bg-white mb-4">
                        <div class="text-right">
                            <h3 class="font-bold text-lg text-slate-800">${c.name}</h3>
                            <p class="text-sm text-gray-500">${c.city || ''}</p>
                            <p class="text-xs mt-1 font-bold text-orange-600 italic">טיפול הבא: ${dayjs(c.nextService).format('DD/MM/YYYY')}</p>
                        </div>
                        <button onclick="openServiceForm('${c.firebaseId}')" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold active:scale-95 transition-all">התחל</button>
                    </div>`;
            });
        }

        async function saveNewCustomer() {
            const nameInput = document.getElementById('new-cust-name');
            const cityInput = document.getElementById('new-cust-city');
            const phoneInput = document.getElementById('new-cust-phone');

            if (!nameInput.value) return alert("חובה להזין שם לקוח");

            try {
                await customersRef.push({
                    name: nameInput.value,
                    city: cityInput.value,
                    phone: phoneInput.value,
                    nextService: getSmartTwoWeeksDate()
                });
                closeModal();
                nameInput.value = ''; cityInput.value = ''; phoneInput.value = '';
            } catch (e) {
                alert("שגיאת סנכרון: " + e.message);
            }
        }

        function openServiceForm(id) {
            activeCustomerId = id;
            const customer = customers.find(c => c.firebaseId === id);
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('service-screen').classList.remove('hidden');
            document.getElementById('current-customer-name').innerText = "ביקור אצל: " + customer.name;
            document.getElementById('next_service_date').value = getSmartTwoWeeksDate();
            window.scrollTo(0,0);
        }

        async function saveServiceReport() {
            const newDate = document.getElementById('next_service_date').value;
            const customer = customers.find(c => c.firebaseId === activeCustomerId);
            
            if (customer) {
                const fid = customer.firebaseId;
                const updatedData = { ...customer, nextService: newDate };
                delete updatedData.firebaseId; // מונע שמירת ה-ID בתוך השדות

                try {
                    await db.ref('customers/' + fid).set(updatedData);
                    closeForm();
                    alert("הדו\"ח נשמר והתאריך הבא עודכן בהצלחה!");
                } catch (e) {
                    alert("שגיאה בעדכון: " + e.message);
                }
            }
        }

        // ניהול ממשק
        function openAddCustomerModal() { document.getElementById('modal-overlay').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
        function closeForm() {
            document.getElementById('service-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('today-date').innerText = dayjs().format('DD/MM/YYYY');
        });
    </script>
</body>
</html>
