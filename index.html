<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PoolCare Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.7/dayjs.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-qWvH9C9X8M0f8U_xY7k2S1L0r3E",
            authDomain: "pool-8526c.firebaseapp.com",
            projectId: "pool-8526c",
            databaseURL: "https://pool-8526c-default-rtdb.europe-west1.firebasedatabase.app/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const customersRef = ref(db, 'customers');

        // טעינת לקוחות בזמן אמת
        onValue(customersRef, (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            
            if (data) {
                Object.keys(data).forEach(id => {
                    const c = data[id];
                    list.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl shadow mb-3 border-r-4 border-blue-500 text-right">
                            <h3 class="font-bold text-lg">${c.name}</h3>
                            <p class="text-sm text-gray-500">${c.city || ''} | ${c.phone || ''}</p>
                        </div>`;
                });
            } else {
                list.innerHTML = '<p class="text-center text-gray-400 mt-10">אין לקוחות כרגע</p>';
            }
        });

        window.saveNewCustomer = async () => {
            const name = document.getElementById('new_cust_name').value;
            if (!name) {
                alert("נא להזין שם לקוח");
                return;
            }

            const btn = document.getElementById('save-btn');
            btn.innerText = "שומר...";
            btn.disabled = true;

            try {
                await push(customersRef, {
                    name: name,
                    city: document.getElementById('new_cust_city').value,
                    phone: document.getElementById('new_cust_phone').value,
                    nextService: dayjs().add(14, 'day').format('YYYY-MM-DD')
                });
                document.getElementById('modal-overlay').classList.add('hidden');
                document.getElementById('new_cust_name').value = '';
            } catch (error) {
                console.error(error);
                alert("שגיאה בסנכרון: " + error.message);
            } finally {
                btn.innerText = "שמור וסנכרן";
                btn.disabled = false;
            }
        };

        window.toggleModal = (show) => {
            document.getElementById('modal-overlay').classList.toggle('hidden', !show);
        };
    </script>
</head>
<body class="bg-slate-50 p-4">
    <div class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-6 pt-4 text-right">
            <div>
                <h1 class="text-2xl font-black">הבריכות שלי</h1>
            </div>
            <button onclick="toggleModal(true)" class="bg-blue-600 text-white w-12 h-12 rounded-full text-2xl shadow-lg">+</button>
        </div>
        <div id="customer-list"></div>
    </div>

    <div id="modal-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full rounded-3xl p-6 text-right">
            <h2 class="text-xl font-bold mb-4">לקוח חדש</h2>
            <input type="text" id="new_cust_name" placeholder="שם הלקוח" class="w-full border p-3 rounded-xl mb-3 text-right">
            <input type="text" id="new_cust_city" placeholder="יישוב" class="w-full border p-3 rounded-xl mb-3 text-right">
            <input type="tel" id="new_cust_phone" placeholder="טלפון" class="w-full border p-3 rounded-xl mb-4 text-right">
            <button id="save-btn" onclick="saveNewCustomer()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">שמור וסנכרן</button>
            <button onclick="toggleModal(false)" class="w-full text-gray-400 py-3 mt-2">ביטול</button>
        </div>
    </div>
</body>
</html>
