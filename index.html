<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    
    <title>PoolCare Pro - Professional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.7/dayjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; touch-action: manipulation; background-color: #f8fafc; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        input, select, textarea { border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; width: 100%; font-size: 16px; text-align: right; }
        input:focus, textarea:focus { font-size: 16px !important; outline: none; border-color: #2563eb; }
        .input-qty { width: 80px; padding: 6px; text-align: center; border-bottom: 2px solid #2563eb; border-radius: 6px; background: #f0f7ff; font-weight: bold; }
        .btn-primary { background: #2563eb; color: white; border-radius: 14px; padding: 16px; font-weight: 700; width: 100%; border: none; transition: opacity 0.2s; }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .btn-whatsapp { background: #25d366; color: white; border-radius: 14px; padding: 16px; font-weight: 700; width: 100%; border: none; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-delete { color: #ef4444; font-weight: bold; padding: 8px; }
        .btn-edit { color: #2563eb; font-weight: bold; padding: 8px; }
        .hidden { display: none; }
        .modal-bg { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .section-title { font-weight: bold; border-bottom: 2px solid #eff6ff; padding-bottom: 8px; margin-bottom: 16px; color: #1e3a8a; }
        .chem-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: #f8fafc; border-radius: 12px; }
        .history-item { border-right: 4px solid #2563eb; background: #f1f5f9; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 14px; }
        .sched-item { border-bottom: 1px solid #f1f5f9; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .calc-msg { font-size: 12px; font-weight: bold; margin-top: 4px; display: block; }
    </style>
</head>
<body class="text-slate-900 pb-10">

    <!-- מסך ראשי -->
    <div id="main-screen" class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-start mb-6 pt-6 text-right">
            <div>
                <h1 class="text-2xl font-black text-slate-900">הבריכות שלי</h1>
                <p id="today-date" class="text-blue-600 font-bold"></p>
                <div id="sync-status" class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full inline-flex items-center gap-1 mt-1">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> מסונכרן לענן
                </div>
                <div class="block mt-2">
                    <button onclick="openSchedule()" class="text-blue-600 font-bold border-2 border-blue-600 px-4 py-1 rounded-full text-sm">📅 לו"ז טיפולים</button>
                </div>
            </div>
            <button onclick="openAddCustomerModal()" class="bg-blue-600 text-white w-14 h-14 rounded-full text-3xl shadow-xl flex items-center justify-center">+</button>
        </header>

        <div class="mb-6 text-right">
            <input type="text" id="search-input" oninput="renderCustomers()" placeholder="חפש לקוח לפי שם או עיר..." class="shadow-sm">
        </div>

        <div id="customer-list" class="space-y-4"></div>
    </div>

    <!-- מודאל לו"ז -->
    <div id="schedule-modal" class="modal-bg hidden">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl text-right flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="text-xl font-bold">סדר טיפולים קרוב</h3>
                <button onclick="closeSchedule()" class="text-2xl">✕</button>
            </div>
            <div id="schedule-content" class="overflow-y-auto pr-1"></div>
        </div>
    </div>

    <!-- מודאל הוספה/עריכה -->
    <div id="modal-overlay" class="modal-bg hidden">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl text-right">
            <h3 id="modal-title" class="text-xl font-bold mb-6 text-slate-800">הוספת לקוח חדש</h3>
            <div class="space-y-4">
                <input type="hidden" id="edit-cust-id">
                <input type="text" id="new-cust-name" placeholder="שם הלקוח">
                <input type="text" id="new-cust-city" placeholder="יישוב">
                <input type="tel" id="new-cust-phone" placeholder="מספר טלפון">
                <input type="number" id="new-cust-volume" placeholder="נפח בריכה (קוב)">
                <button onclick="saveCustomer()" class="btn-primary mt-4">שמור וסנכרן ☁️</button>
                <button onclick="closeModal()" class="w-full text-slate-400 py-2 font-bold">ביטול</button>
            </div>
        </div>
    </div>

    <!-- מודאל היסטוריה מפורטת -->
    <div id="history-modal" class="modal-bg hidden">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl text-right flex flex-col max-h-[85vh]">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 id="history-cust-name" class="text-xl font-bold">היסטוריית טיפולים</h3>
                <button onclick="closeHistory()" class="text-2xl">✕</button>
            </div>
            <div id="history-content" class="overflow-y-auto space-y-4 pr-1 text-sm"></div>
        </div>
    </div>

    <!-- מסך טופס טיפול -->
    <div id="service-screen" class="max-w-md mx-auto p-4 hidden text-right">
        <button onclick="closeForm()" class="text-blue-600 font-bold mb-6 flex items-center gap-2">✕ ביטול וחזרה</button>
        <h2 id="current-customer-name" class="text-2xl font-black mb-1 text-slate-900 border-b-4 border-blue-600 pb-2 inline-block"></h2>
        <p id="current-customer-vol-display" class="text-sm text-blue-600 font-bold mb-6"></p>
        
        <form id="service-form" onsubmit="event.preventDefault();">
            <div class="space-y-6">
                <section class="card p-5 bg-blue-600 text-white shadow-lg">
                    <label class="block text-sm font-bold mb-2">📅 קביעת טיפול הבא:</label>
                    <input type="date" id="next_service_date" class="text-blue-900 font-bold">
                </section>

                <section class="card p-5 shadow-sm">
                    <h3 class="section-title">📊 בדיקת ערכים</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs mb-1 text-gray-500">PH (7.2-7.6)</label>
                            <input type="number" step="0.1" id="val_ph" placeholder="7.2" oninput="runCalculations()">
                            <span id="calc-ph-msg" class="calc-msg text-red-500"></span>
                        </div>
                        <div>
                            <label class="block text-xs mb-1 text-gray-500">כלור (1.5-3.0)</label>
                            <input type="number" step="0.1" id="val_chlorine" placeholder="1.5" oninput="runCalculations()">
                            <span id="calc-cl-msg" class="calc-msg text-green-600"></span>
                        </div>
                        <div>
                            <label class="block text-xs mb-1 text-gray-500">Redox (600-800)</label>
                            <input type="number" id="val_redox" placeholder="700" oninput="runCalculations()">
                        </div>
                        <div>
                            <label class="block text-xs mb-1 text-gray-500">מלח (2000-3500)</label>
                            <input type="number" id="val_salt" placeholder="3000" oninput="runCalculations()">
                        </div>
                    </div>
                </section>

                <section class="card p-5 shadow-sm">
                    <h3 class="section-title">📸 צילום הבריכה</h3>
                    <div class="flex flex-col items-center gap-4">
                        <input type="file" id="photo_input" accept="image/*" capture="environment" class="hidden" onchange="previewImage(this)">
                        <button type="button" onclick="document.getElementById('photo_input').click()" class="w-full bg-slate-100 border-2 border-dashed border-slate-300 py-4 rounded-xl text-slate-600 font-bold flex items-center justify-center gap-2">
                            📷 צלם תמונה או העלה
                        </button>
                        <div id="image_preview_container" class="hidden w-full relative">
                            <img id="image_preview" src="" class="w-full h-48 object-cover rounded-xl shadow-md border">
                            <button type="button" onclick="clearImage()" class="absolute top-2 left-2 bg-red-600 text-white rounded-full p-2 text-xs">✕ הסר</button>
                        </div>
                    </div>
                </section>

                <section class="card p-5 shadow-sm">
                    <h3 class="section-title">🧪 חומרים שנוספו</h3>
                    <div class="space-y-3">
                        <div class="chem-row">
                            <label class="flex items-center gap-2 font-bold text-red-600"><input type="checkbox" id="chem_hth" class="w-5 h-5"> HTH</label>
                            <div class="flex items-center gap-2">
                                <input type="number" id="qty_hth" placeholder="0" class="input-qty"> <span class="text-xs text-gray-400">גרם</span>
                            </div>
                        </div>
                        <div class="chem-row">
                            <label class="flex items-center gap-2"><input type="checkbox" id="chem_chlorine" class="w-5 h-5"> כלור</label>
                            <div class="flex items-center gap-2">
                                <input type="number" id="qty_chlorine" placeholder="0" class="input-qty"> <span class="text-xs text-gray-400">גרם</span>
                            </div>
                        </div>
                        <div class="chem-row">
                            <label class="flex items-center gap-2"><input type="checkbox" id="chem_ph_minus" class="w-5 h-5"> PH מינוס</label>
                            <div class="flex items-center gap-2">
                                <input type="number" id="qty_ph_minus" placeholder="0" class="input-qty"> <span class="text-xs text-gray-400">גרם</span>
                            </div>
                        </div>
                        <div class="chem-row bg-blue-50 border-blue-200 border">
                            <label class="flex items-center gap-2 font-bold text-blue-700"><input type="checkbox" id="replace_acid" class="w-5 h-5"> החלפת גלון חומצה</label>
                        </div>
                        <div class="chem-row bg-blue-50 border-blue-200 border">
                            <label class="flex items-center gap-2 font-bold text-blue-700"><input type="checkbox" id="replace_chlorine" class="w-5 h-5"> החלפת גלון כלור</label>
                        </div>
                        <div class="chem-row bg-green-50 border-green-200 border">
                            <label class="flex items-center gap-2 font-bold text-green-700"><input type="checkbox" id="supply_salt" class="w-5 h-5"> אספקת שקי מלח</label>
                            <div class="flex items-center gap-2">
                                <input type="number" id="qty_salt" placeholder="0" class="input-qty border-green-300"> <span class="text-xs text-gray-400">שקים</span>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="card p-5 shadow-sm">
                    <h3 class="section-title">🛠️ תחזוקה שבוצעה</h3>
                    <div class="grid grid-cols-1 gap-3">
                        <label class="flex items-center gap-3 p-2 border rounded-lg"><input type="checkbox" id="task_filter" class="w-5 h-5"> שטיפת פילטרים</label>
                        <label class="flex items-center gap-3 p-2 border rounded-lg"><input type="checkbox" id="task_skimmer" class="w-5 h-5"> ניקוי סקימרים</label>
                        <label class="flex items-center gap-3 p-2 border rounded-lg"><input type="checkbox" id="task_vacuum" class="w-5 h-5"> שאיבה / רובוט</label>
                    </div>
                </section>

                <section class="card p-5 shadow-sm">
                    <h3 class="section-title">📝 הערות</h3>
                    <textarea id="service_notes" rows="3" placeholder="הערות לביקור..."></textarea>
                </section>

                <div id="action-buttons">
                    <button id="save-btn" type="button" onclick="saveServiceReport()" class="btn-primary shadow-xl text-lg">סיום טיפול וסנכרון ☁️</button>
                    <button id="whatsapp-btn" type="button" onclick="sendWhatsAppSummary()" class="btn-whatsapp shadow-lg hidden">
                        <span>שלח סיכום בוואטסאפ 📱</span>
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBA-DEcrr5Stcdvw77x0Gji1BPn6HxHMQ",
            authDomain: "pool-8526c.firebaseapp.com",
            projectId: "pool-8526c",
            databaseURL: "https://pool-8526c-default-rtdb.europe-west1.firebasedatabase.app/",
            storageBucket: "pool-8526c.appspot.com"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();
        const customersRef = db.ref('customers');

        let customers = [];
        let activeCustomerId = null;
        let selectedFile = null;
        let currentPoolVolume = 0;

        const connectedRef = db.ref(".info/connected");
        connectedRef.on("value", (snap) => {
            const statusDiv = document.getElementById('sync-status');
            if (snap.val() === true) {
                statusDiv.innerHTML = '<span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> מסונכרן לענן';
                statusDiv.className = "text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full inline-flex items-center gap-1 mt-1";
            } else {
                statusDiv.innerHTML = '<span class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></span> עובד אופליין';
                statusDiv.className = "text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full inline-flex items-center gap-1 mt-1";
            }
        });

        function getSmartTwoWeeksDate() {
            let target = dayjs().add(14, 'day');
            if (target.day() === 5) target = target.add(2, 'day');
            else if (target.day() === 6) target = target.add(1, 'day');
            return target.format('YYYY-MM-DD');
        }

        customersRef.on('value', (snapshot) => {
            const data = snapshot.val();
            customers = data ? Object.keys(data).map(key => ({ firebaseId: key, ...data[key] })) : [];
            renderCustomers();
        });

        function renderCustomers() {
            const list = document.getElementById('customer-list');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            list.innerHTML = '';
            customers.filter(c => c.name.toLowerCase().includes(searchTerm) || (c.city && c.city.toLowerCase().includes(searchTerm))).forEach(c => {
                list.innerHTML += `
                    <div class="card p-5 border-r-8 border-blue-500 mb-4 text-right shadow-md">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-bold text-xl text-slate-800">${c.name}</h3>
                                <p class="text-sm text-gray-500">${c.city || 'אין כתובת'} | ${c.volume || 0} קוב</p>
                                <div class="flex gap-4 mt-2">
                                    <button onclick="showHistory('${c.firebaseId}')" class="text-blue-600 text-xs font-bold">📜 היסטוריה</button>
                                    <a href="tel:${c.phone}" class="text-green-600 text-xs font-bold underline">📞 התקשר</a>
                                </div>
                            </div>
                            <div class="flex flex-col">
                                <button onclick="openEditCustomerModal('${c.firebaseId}')" class="btn-edit text-xs">עריכה ✏️</button>
                                <button onclick="deleteCustomer('${c.firebaseId}', '${c.name}')" class="btn-delete text-xs">מחיקה 🗑️</button>
                            </div>
                        </div>
                        <button onclick="openServiceForm('${c.firebaseId}')" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg">התחל ביקור 🏊‍♂️</button>
                    </div>`;
            });
        }

        function runCalculations() {
            const phEl = document.getElementById('val_ph');
            const clEl = document.getElementById('val_chlorine');
            const redoxEl = document.getElementById('val_redox');
            const saltEl = document.getElementById('val_salt');

            const ph = parseFloat(phEl.value);
            const cl = parseFloat(clEl.value);
            const redox = parseFloat(redoxEl.value);
            const salt = parseFloat(saltEl.value);

            const phMsg = document.getElementById('calc-ph-msg');
            const clMsg = document.getElementById('calc-cl-msg');
            
            phMsg.innerText = ""; clMsg.innerText = "";
            const alertColor = "#ff0000"; // אדום בוהק
            const textColor = "white";
            
            // PH (7.2-7.6)
            if (!isNaN(ph)) {
                if (ph < 7.2 || ph > 7.6) {
                    phEl.style.backgroundColor = alertColor; phEl.style.color = textColor;
                } else {
                    phEl.style.backgroundColor = "white"; phEl.style.color = "black";
                }
                if (ph > 7.6 && currentPoolVolume > 0) {
                    const liters = ((ph - 7.4) * 200 * currentPoolVolume / 1000).toFixed(1);
                    phMsg.innerText = `🧪 להוסיף כ-${liters} ליטר חומצה`;
                }
            } else { phEl.style.backgroundColor = "white"; phEl.style.color = "black"; }

            // CL (1.5-3.0)
            if (!isNaN(cl)) {
                if (cl < 1.5 || cl > 3.0) {
                    clEl.style.backgroundColor = alertColor; clEl.style.color = textColor;
                } else {
                    clEl.style.backgroundColor = "white"; clEl.style.color = "black";
                }
                if (cl < 1.5 && currentPoolVolume > 0) {
                    const hours = (((2.0 - cl) * currentPoolVolume) / 20).toFixed(1);
                    clMsg.innerText = `⚙️ להפעיל ייצור ל-${hours} שעות`;
                }
            } else { clEl.style.backgroundColor = "white"; clEl.style.color = "black"; }

            // Redox (600-800) - טווח מעודכן
            if (!isNaN(redox)) {
                if (redox < 600 || redox > 800) {
                    redoxEl.style.backgroundColor = alertColor; redoxEl.style.color = textColor;
                } else {
                    redoxEl.style.backgroundColor = "white"; redoxEl.style.color = "black";
                }
            } else { redoxEl.style.backgroundColor = "white"; redoxEl.style.color = "black"; }

            // מלח (2000-3500) - טווח מעודכן
            if (!isNaN(salt)) {
                if (salt < 2000 || salt > 3500) {
                    saltEl.style.backgroundColor = alertColor; saltEl.style.color = textColor;
                } else {
                    saltEl.style.backgroundColor = "white"; saltEl.style.color = "black";
                }
            } else { saltEl.style.backgroundColor = "white"; saltEl.style.color = "black"; }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                selectedFile = input.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('image_preview').src = e.target.result;
                    document.getElementById('image_preview_container').classList.remove('hidden');
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearImage() {
            selectedFile = null;
            document.getElementById('photo_input').value = "";
            document.getElementById('image_preview_container').classList.add('hidden');
        }

        async function uploadPhoto(customerId) {
            if (!selectedFile) return null;
            try {
                const fileName = `pools/${customerId}/${dayjs().format('YYYY-MM-DD_HH-mm')}.jpg`;
                const storageRef = storage.ref(fileName);
                const snapshot = await storageRef.put(selectedFile);
                return await snapshot.ref.getDownloadURL();
            } catch (e) { return null; }
        }

        function showHistory(id) {
            const c = customers.find(curr => curr.firebaseId === id);
            document.getElementById('history-cust-name').innerText = "היסטוריה: " + c.name;
            const content = document.getElementById('history-content');
            content.innerHTML = '';
            if (c.history) {
                Object.values(c.history).reverse().forEach(h => {
                    let chemList = [];
                    if(h.chems) {
                        if(h.chems.hth?.qty) chemList.push(`HTH: ${h.chems.hth.qty}ג'`);
                        if(h.chems.chlorine?.qty) chemList.push(`כלור: ${h.chems.chlorine.qty}ג'`);
                        if(h.chems.phMinus?.qty) chemList.push(`PH-: ${h.chems.phMinus.qty}ג'`);
                        if(h.chems.replacedAcid) chemList.push(`🔄 גלון חומצה`);
                        if(h.chems.replacedChlorine) chemList.push(`🔄 גלון כלור`);
                        if(h.chems.saltQty > 0) chemList.push(`🧂 ${h.chems.saltQty} שקי מלח`);
                    }
                    content.innerHTML += `<div class="history-item text-right"><div class="font-bold text-blue-800 flex justify-between border-b pb-1 mb-2"><span>📅 ${dayjs(h.date).format('DD/MM/YY')}</span><span>PH: ${h.ph || '-'} | CL: ${h.cl || '-'}</span></div><div class="text-[11px] text-gray-500 mb-1">Redox: ${h.redox || '-'} | מלח: ${h.salt || '-'}</div>${h.photo ? `<div class="mb-2"><img src="${h.photo}" class="w-full h-32 object-cover rounded-lg shadow-sm"></div>` : ''}<div class="mb-1"><span class="font-bold">🧪 חומרים:</span> ${chemList.length > 0 ? chemList.join(", ") : "לא נוספו"}</div><div class="mb-1"><span class="font-bold">🛠️ ביצוע:</span> ${h.tasksPerformed || "טיפול שגרתי"}</div>${h.notes ? `<div class="mt-2 p-2 bg-yellow-50 rounded italic text-gray-700">"${h.notes}"</div>` : ''}</div>`;
                });
            } else { content.innerHTML = '<p class="text-center py-10 text-gray-400">אין היסטוריה</p>'; }
            document.getElementById('history-modal').classList.remove('hidden');
        }

        async function saveServiceReport() {
            const btn = document.getElementById('save-btn');
            try {
                btn.innerText = "מעלה נתונים... ⏳"; btn.disabled = true;
                const photoUrl = await uploadPhoto(activeCustomerId);
                const tasks = [];
                if(document.getElementById('task_filter').checked) tasks.push("שטיפה");
                if(document.getElementById('task_skimmer').checked) tasks.push("סקימרים");
                if(document.getElementById('task_vacuum').checked) tasks.push("שאיבה");
                const reportEntry = {
                    date: dayjs().format('YYYY-MM-DD HH:mm'),
                    ph: document.getElementById('val_ph').value,
                    cl: document.getElementById('val_chlorine').value,
                    redox: document.getElementById('val_redox').value,
                    salt: document.getElementById('val_salt').value,
                    notes: document.getElementById('service_notes').value,
                    tasksPerformed: tasks.join(", "),
                    photo: photoUrl || null,
                    chems: {
                        hth: { qty: document.getElementById('qty_hth').value },
                        chlorine: { qty: document.getElementById('qty_chlorine').value },
                        phMinus: { qty: document.getElementById('qty_ph_minus').value },
                        replacedAcid: document.getElementById('replace_acid').checked,
                        replacedChlorine: document.getElementById('replace_chlorine').checked,
                        saltQty: document.getElementById('qty_salt').value
                    }
                };
                await db.ref('customers/' + activeCustomerId + '/history').push(reportEntry);
                await db.ref('customers/' + activeCustomerId).update({ nextService: document.getElementById('next_service_date').value, lastVisit: dayjs().format('YYYY-MM-DD') });
                alert("נשמר בהצלחה!");
                document.getElementById('whatsapp-btn').classList.remove('hidden');
                document.getElementById('save-btn').classList.add('hidden');
                btn.disabled = false; btn.innerText = "סיום טיפול וסנכרון ☁️";
            } catch (e) { alert("שגיאה בשמירה: " + e.message); btn.disabled = false; btn.innerText = "סיום טיפול וסנכרון ☁️"; }
        }

        function sendWhatsAppSummary() {
            const customer = customers.find(c => c.firebaseId === activeCustomerId);
            if (!customer) return;

            const phVal = parseFloat(document.getElementById('val_ph').value);
            const clVal = parseFloat(document.getElementById('val_chlorine').value);
            const redox = document.getElementById('val_redox').value || '-';
            const salt = document.getElementById('val_salt').value || '-';
            const notes = document.getElementById('service_notes').value;
            const nextDate = dayjs(document.getElementById('next_service_date').value).format('DD/MM/YY');
            
            const phStatus = (phVal >= 7.2 && phVal <= 7.6) ? "✅" : "⚠️ (חריגה)";
            const clStatus = (clVal >= 1.5 && clVal <= 3.0) ? "✅" : "⚠️ (חריגה)";

            let chemText = "";
            const hth = document.getElementById('qty_hth').value;
            const chlorineQty = document.getElementById('qty_chlorine').value;
            const phMinus = document.getElementById('qty_ph_minus').value;
            const saltQty = document.getElementById('qty_salt').value;

            if(hth > 0) chemText += `\n- HTH: ${hth}ג'`;
            if(chlorineQty > 0) chemText += `\n- כלור: ${chlorineQty}ג'`;
            if(phMinus > 0) chemText += `\n- PH מינוס: ${phMinus}ג'`;
            if(document.getElementById('replace_acid').checked) chemText += `\n- הוחלף גלון חומצה 🔄`;
            if(document.getElementById('replace_chlorine').checked) chemText += `\n- הוחלף גלון כלור 🔄`;
            if(saltQty > 0) chemText += `\n- סופקו ${saltQty} שקי מלח 🧂`;

            let tasksText = "";
            if(document.getElementById('task_filter').checked) tasksText += " שטיפה,";
            if(document.getElementById('task_skimmer').checked) tasksText += " סקימרים,";
            if(document.getElementById('task_vacuum').checked) tasksText += " שאיבה,";
            if(tasksText) tasksText = tasksText.slice(0, -1);

            let text = `שלום ${customer.name}, להלן סיכום ביקור לבריכה שלך בתאריך ${dayjs().format('DD/MM/YY')}:\n\n📊 *מדדים:* \nPH: ${phVal || '-'} ${phStatus}\nכלור: ${clVal || '-'} ${clStatus}\nRedox: ${redox}\nמלח: ${salt}\n`;
            if(tasksText) text += `\n🛠️ *תחזוקה שבוצעה:* ${tasksText}\n`;
            if(chemText) text += `\n🧪 *חומרים שנוספו:*${chemText}\n`;
            if(notes) text += `\n📝 *הערות:* ${notes}\n`;
            text += `\n📅 *ביקור הבא:* ${nextDate}\n\nהמשך שבוע מהנה! 🏊‍♂️`;
            
            const phone = customer.phone ? customer.phone.replace(/[^0-9]/g, '') : '';
            const finalPhone = phone.startsWith('0') ? '972' + phone.substring(1) : phone;
            window.location.assign(`https://wa.me/${finalPhone}?text=${encodeURIComponent(text)}`);
            setTimeout(() => { closeForm(); }, 1500);
        }

        function closeForm() { 
            document.getElementById('service-form').reset();
            ['val_ph', 'val_chlorine', 'val_redox', 'val_salt'].forEach(id => {
                const el = document.getElementById(id); el.style.backgroundColor = "white"; el.style.color = "black";
            });
            document.getElementById('whatsapp-btn').classList.add('hidden');
            document.getElementById('save-btn').classList.remove('hidden');
            clearImage();
            document.getElementById('service-screen').classList.add('hidden'); 
            document.getElementById('main-screen').classList.remove('hidden'); 
        }

        function openSchedule() {
            const content = document.getElementById('schedule-content');
            content.innerHTML = '';
            [...customers].sort((a, b) => dayjs(a.nextService).unix() - dayjs(b.nextService).unix()).forEach(c => {
                content.innerHTML += `<div onclick="goToService('${c.firebaseId}')" class="sched-item"><span>${c.name}</span><span class="font-bold text-blue-600">${dayjs(c.nextService).format('DD/MM')}</span></div>`;
            });
            document.getElementById('schedule-modal').classList.remove('hidden');
        }

        function openServiceForm(id) {
            activeCustomerId = id;
            const c = customers.find(curr => curr.firebaseId === id);
            currentPoolVolume = parseFloat(c.volume) || 0;
            document.getElementById('current-customer-name').innerText = c.name;
            document.getElementById('current-customer-vol-display').innerText = `נפח בריכה: ${currentPoolVolume} קוב`;
            document.getElementById('next_service_date').value = getSmartTwoWeeksDate();
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('service-screen').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function goToService(id) { document.getElementById('schedule-modal').classList.add('hidden'); openServiceForm(id); }
        function openAddCustomerModal() { 
            document.getElementById('modal-title').innerText = "הוספת לקוח חדש";
            document.getElementById('edit-cust-id').value = ""; document.getElementById('new-cust-name').value = "";
            document.getElementById('new-cust-city').value = ""; document.getElementById('new-cust-phone').value = "";
            document.getElementById('new-cust-volume').value = ""; document.getElementById('modal-overlay').classList.remove('hidden'); 
        }
        function openEditCustomerModal(id) {
            const c = customers.find(curr => curr.firebaseId === id);
            document.getElementById('modal-title').innerText = "עריכת לקוח: " + c.name;
            document.getElementById('edit-cust-id').value = id; document.getElementById('new-cust-name').value = c.name;
            document.getElementById('new-cust-city').value = c.city || ''; document.getElementById('new-cust-phone').value = c.phone || '';
            document.getElementById('new-cust-volume').value = c.volume || ''; document.getElementById('modal-overlay').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
        function closeHistory() { document.getElementById('history-modal').classList.add('hidden'); }
        function closeSchedule() { document.getElementById('schedule-modal').classList.add('hidden'); }
        async function saveCustomer() {
            const id = document.getElementById('edit-cust-id').value;
            const data = { 
                name: document.getElementById('new-cust-name').value, city: document.getElementById('new-cust-city').value, 
                phone: document.getElementById('new-cust-phone').value, volume: document.getElementById('new-cust-volume').value 
            };
            if (id) { await db.ref('customers/' + id).update(data); } else { data.nextService = getSmartTwoWeeksDate(); await customersRef.push(data); }
            closeModal();
        }
        async function deleteCustomer(id, name) { 
            const password = prompt(`בטוח שברצונך למחוק את ${name}?\nהזן סיסמה לביצוע:`);
            if (password === "1234") { await db.ref('customers/' + id).remove(); alert("נמחק."); }
        }
        document.getElementById('today-date').innerText = dayjs().format('DD/MM/YYYY');
    </script>
</body>
</html
