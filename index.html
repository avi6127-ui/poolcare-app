<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PoolCare Pro - Pool</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.7/dayjs.min.js"></script>
    
    <!-- שימוש בגרסאות יציבות של Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; touch-action: manipulation; background-color: #f8fafc; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); transition: all 0.2s; }
        input { border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; width: 100%; font-size: 16px; text-align: right; outline: none; }
        input:focus { border-color: #2563eb; ring: 2px ring-blue-500; }
        .btn-primary { background: #2563eb; color: white; border-radius: 14px; padding: 16px; font-weight: 700; width: 100%; border: none; cursor: pointer; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
        .hidden { display: none; }
        #modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); transition: opacity 0.3s; }
    </style>
</head>
<body class="text-slate-900 pb-10 text-right">

    <div id="main-screen" class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-8 pt-6">
            <div>
                <h1 class="text-2xl font-black text-slate-900">הבריכות שלי</h1>
                <p id="today-date" class="text-blue-600 font-bold"></p>
                <div id="connection-status" class="text-xs text-gray-400 mt-1">מתחבר לענן...</div>
            </div>
            <button onclick="openAddCustomerModal()" class="bg-blue-600 text-white w-14 h-14 rounded-full text-3xl shadow-xl flex items-center justify-center active:bg-blue-700">+</button>
        </header>
        <div id="customer-list" class="space-y-4">
            <!-- רשימת הלקוחות תטען כאן -->
        </div>
    </div>

    <!-- מודאל הוספת לקוח -->
    <div id="modal-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-slate-800 text-center">הוספת לקוח חדש</h3>
            <div class="space-y-4">
                <input type="text" id="new-cust-name" placeholder="שם הלקוח (חובה)">
                <input type="text" id="new-cust-city" placeholder="יישוב">
                <input type="tel" id="new-cust-phone" placeholder="מספר טלפון">
                <button id="save-btn" onclick="saveNewCustomer()" class="btn-primary mt-4">שמור וסנכרן לענן ☁️</button>
                <button onclick="closeModal()" class="w-full text-slate-400 py-2 font-bold">ביטול</button>
            </div>
        </div>
    </div>

    <script>
        // --- הגדרות Firebase לפרויקט Pool ---
        const firebaseConfig = {
            apiKey: "AIzaSyCBA-DEcrr5Stcdvw77x0Gji1BPn6HxHMQ",
            authDomain: "pool-8526c.firebaseapp.com",
            projectId: "pool-8526c",
            storageBucket: "pool-8526c.firebasestorage.app",
            messagingSenderId: "301080908637",
            appId: "1:301080908637:web:f708d4e4c9fd6c5f590eb4",
            measurementId: "G-FX7K174PBH",
            databaseURL: "https://pool-8526c-default-rtdb.europe-west1.firebasedatabase.app"
        };

        // אתחול
        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            console.log("Firebase initialized");
        } catch (e) {
            alert("שגיאת אתחול: " + e.message);
        }

        const db = firebase.database();
        const customersRef = db.ref('customers');

        // בדיקת חיבור אקטיבית
        const connectedRef = db.ref(".info/connected");
        connectedRef.on("value", (snap) => {
            const statusDiv = document.getElementById('connection-status');
            if (snap.val() === true) {
                statusDiv.innerText = "● מחובר לענן";
                statusDiv.classList.replace('text-gray-400', 'text-green-600');
            } else {
                statusDiv.innerText = "○ מנסה להתחבר...";
                statusDiv.classList.replace('text-green-600', 'text-orange-500');
            }
        });

        let customers = [];

        function getSmartTwoWeeksDate() {
            let target = dayjs().add(14, 'day');
            if (target.day() === 5) target = target.add(2, 'day');
            else if (target.day() === 6) target = target.add(1, 'day');
            return target.format('YYYY-MM-DD');
        }

        // האזנה לנתונים
        customersRef.on('value', (snapshot) => {
            const data = snapshot.val();
            customers = data ? Object.keys(data).map(key => ({ firebaseId: key, ...data[key] })) : [];
            renderCustomers();
        }, (error) => {
            console.error("Firebase Error:", error);
            if(error.message.includes("permission_denied")) {
                alert("שגיאת הרשאות: ודאי שה-Rules ב-Firebase מוגדרים כ-true");
            }
        });

        function renderCustomers() {
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            
            if (customers.length === 0) {
                list.innerHTML = '<div class="text-center text-gray-400 mt-10">אין לקוחות רשומים בענן.</div>';
                return;
            }

            const sorted = [...customers].sort((a, b) => dayjs(a.nextService).isAfter(dayjs(b.nextService)) ? 1 : -1);

            sorted.forEach(c => {
                list.innerHTML += `
                    <div class="card p-5 border-r-8 border-blue-500 flex justify-between items-center bg-white mb-4">
                        <div class="text-right">
                            <h3 class="font-bold text-lg text-slate-800">${c.name}</h3>
                            <p class="text-sm text-gray-500">${c.city || ''}</p>
                            <p class="text-xs mt-1 font-bold text-orange-600 italic">טיפול הבא: ${dayjs(c.nextService).format('DD/MM/YYYY')}</p>
                        </div>
                        <div class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-bold">פעיל</div>
                    </div>`;
            });
        }

        async function saveNewCustomer() {
            const btn = document.getElementById('save-btn');
            const name = document.getElementById('new-cust-name').value;
            const city = document.getElementById('new-cust-city').value;
            const phone = document.getElementById('new-cust-phone').value;

            if (!name) return alert("חובה להזין שם לקוח!");

            // מניעת לחיצות כפולות וסימון ויזואלי
            btn.disabled = true;
            btn.innerText = "שומר...";

            try {
                console.log("Attempting to save to:", firebaseConfig.databaseURL);
                await customersRef.push({
                    name, 
                    city, 
                    phone,
                    nextService: getSmartTwoWeeksDate(),
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
                
                closeModal();
                // איפוס שדות
                document.getElementById('new-cust-name').value = '';
                document.getElementById('new-cust-city').value = '';
                document.getElementById('new-cust-phone').value = '';
            } catch (e) {
                console.error("Save failed:", e);
                alert("הסנכרון נכשל: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "שמור וסנכרן לענן ☁️";
            }
        }

        function openAddCustomerModal() { document.getElementById('modal-overlay').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('today-date').innerText = dayjs().format('DD/MM/YYYY');
        });
    </script>
</body>
</html>
