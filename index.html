<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // הגדרות ה-Firebase שלך
    const firebaseConfig = {
        apiKey: "AIzaSyByGzovNpq9WksV3Y_lLBAZC_I-NcLA8pA",
        authDomain: "poolcare-data.firebaseapp.com",
        projectId: "poolcare-data",
        storageBucket: "poolcare-data.firebasestorage.app",
        messagingSenderId: "618878936393",
        appId: "1:618878936393:web:0be324b60af54283cae698",
        databaseURL: "https://poolcare-data-default-rtdb.europe-west1.firebasedatabase.app/" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const customersRef = ref(db, 'customers');

    let customers = [];
    let activeCustomerId = null;

    // פונקציית עזר לתאריך
    function getSmartTwoWeeksDate() {
        let target = dayjs().add(14, 'day');
        if (target.day() === 5) target = target.add(2, 'day');
        else if (target.day() === 6) target = target.add(1, 'day');
        return target.format('YYYY-MM-DD');
    }

    // האזנה לנתונים מהענן
    onValue(customersRef, (snapshot) => {
        const data = snapshot.val();
        customers = data ? Object.keys(data).map(key => ({ firebaseId: key, ...data[key] })) : [];
        renderCustomers();
    });

    window.renderCustomers = () => {
        const list = document.getElementById('customer-list');
        list.innerHTML = '';
        const sorted = [...customers].sort((a, b) => dayjs(a.nextService).isAfter(dayjs(b.nextService)) ? 1 : -1);

        if (sorted.length === 0) {
            list.innerHTML = '<p class="text-center text-gray-400 mt-10">אין לקוחות. לחצי על + להוספה.</p>';
            return;
        }

        sorted.forEach(c => {
            list.innerHTML += `
                <div class="card p-5 border-r-4 border-blue-500 flex justify-between items-center shadow-sm bg-white mb-4">
                    <div>
                        <h3 class="font-bold text-lg">${c.name}</h3>
                        <p class="text-sm text-gray-500">${c.city || ''}</p>
                        <p class="text-xs mt-1 font-semibold text-orange-600 italic">טיפול הבא: ${dayjs(c.nextService).format('DD/MM/YYYY')}</p>
                    </div>
                    <button onclick="openServiceForm('${c.firebaseId}')" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-medium">התחל</button>
                </div>`;
        });
    };

    window.saveNewCustomer = async () => {
        const name = document.getElementById('new-cust-name').value;
        const city = document.getElementById('new-cust-city').value;
        const phone = document.getElementById('new-cust-phone').value;

        if (!name) { alert("חובה להזין שם"); return; }

        try {
            await push(customersRef, {
                name, city, phone,
                nextService: getSmartTwoWeeksDate()
            });
            closeModal();
            document.getElementById('new-cust-name').value = '';
            document.getElementById('new-cust-city').value = '';
            document.getElementById('new-cust-phone').value = '';
        } catch (e) { alert("שגיאה בסנכרון לענן"); }
    };

    window.openServiceForm = (id) => {
        activeCustomerId = id;
        const customer = customers.find(c => c.firebaseId === id);
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('service-screen').classList.remove('hidden');
        document.getElementById('current-customer-name').innerText = "ביקור אצל: " + customer.name;
        document.getElementById('next_service_date').value = getSmartTwoWeeksDate();
        window.scrollTo(0,0);
    };

    window.saveServiceReport = async () => {
        const newNextDate = document.getElementById('next_service_date').value;
        const customer = customers.find(c => c.firebaseId === activeCustomerId);
        
        if (customer) {
            const fid = customer.firebaseId;
            const updatedData = { ...customer, nextService: newNextDate };
            delete updatedData.firebaseId;

            try {
                await set(ref(db, 'customers/' + fid), updatedData);
                closeForm();
                alert('הנתונים סונכרנו בהצלחה!');
            } catch (e) { alert("שגיאה בעדכון הענן"); }
        }
    };

    // פונקציות ממשק גלובליות
    window.openAddCustomerModal = () => document.getElementById('modal-overlay').classList.remove('hidden');
    window.closeModal = () => document.getElementById('modal-overlay').classList.add('hidden');
    window.closeForm = () => {
        document.getElementById('service-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
    };

    document.getElementById('today-date').innerText = dayjs().format('DD/MM/YYYY');
</script>
