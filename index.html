<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PoolCare Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.7/dayjs.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // ה-Config המעודכן לפי התמונה החדשה שלך (פרויקט Pool)
        const firebaseConfig = {
            apiKey: "AIzaSyD-qWvH9C9X8M0f8U_xY7k2S1L0r3E", // עודכן לפי הפרויקט החדש
            authDomain: "pool-8526c.firebaseapp.com",
            projectId: "pool-8526c",
            storageBucket: "pool-8526c.firebasestorage.app",
            messagingSenderId: "301080908637",
            appId: "1:301080908637:web:f708d4e4c9fd6c5f590eb4",
            databaseURL: "https://pool-8526c-default-rtdb.europe-west1.firebasedatabase.app/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const customersRef = ref(db, 'customers');

        let customers = [];
        let activeCustomerId = null;

        onValue(customersRef, (snapshot) => {
            const data = snapshot.val();
            customers = data ? Object.keys(data).map(key => ({ firebaseId: key, ...data[key] })) : [];
            renderCustomers();
        });

        function getSmartTwoWeeksDate() {
            let target = dayjs().add(14, 'day');
            if (target.day() === 5) target = target.add(2, 'day');
            else if (target.day() === 6) target = target.add(1, 'day');
            return target.format('YYYY-MM-DD');
        }

        window.renderCustomers = () => {
            const list = document.getElementById('customer-list');
            list.innerHTML = '';
            const sorted = [...customers].sort((a, b) => dayjs(a.nextService).isAfter(dayjs(b.nextService)) ? 1 : -1);
            
            if (sorted.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 mt-10 text-lg text-right">אין לקוחות רשומים.</p>';
                return;
            }

            sorted.forEach(c => {
                list.innerHTML += `
                    <div class="card p-5 border-r-8 border-blue-500 flex justify-between items-center bg-white shadow-md mb-4 text-right">
                        <div>
                            <h3 class="font-bold text-xl text-slate-800">${c.name}</h3>
                            <p class="text-sm font-semibold text-orange-600">טיפול הבא: ${dayjs(c.nextService).format('DD/MM/YYYY')}</p>
                        </div>
                        <button onclick="openServiceForm('${c.firebaseId}')" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold active:scale-95 shadow-lg">התחל</button>
                    </div>`;
            });
        };

        window.saveNewCustomer = async () => {
            const nameInput = document.getElementById('new_cust_name');
            if (!nameInput.value) return alert("נא להזין שם לקוח");
            
            const newCust = {
                name: nameInput.value,
                city: document.getElementById('new_cust_city').value,
                phone: document.getElementById('new_cust_phone').value,
                nextService: getSmartTwoWeeksDate()
            };
            
            try {
                await push(customersRef, newCust);
                closeModal();
                nameInput.value = '';
            } catch (e) {
                alert("שגיאה בסנכרון. וודא ש-Rules ב-Database מוגדרים ל-true");
            }
        };

        window.openServiceForm = (id) => {
            activeCustomerId = id;
            const customer = customers.find(c => c.firebaseId === id);
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById('service-screen').classList.remove('hidden');
            document.getElementById('current-customer-name').innerText = customer.name;
            document.getElementById('next_service_date').value = getSmartTwoWeeksDate();
        };

        window.saveServiceReport = async () => {
            const nextDate = document.getElementById('next_service_date').value;
            const customer = customers.find(c => c.firebaseId === activeCustomerId);
            if (customer) {
                const updatedData = { ...customer, nextService: nextDate };
                const fid = updatedData.firebaseId;
                delete updatedData.firebaseId; 
                await set(ref(db, 'customers/' + fid), updatedData);
                closeForm();
            }
        };

        window.closeModal = () => document.getElementById('modal-overlay').classList.add('hidden');
        window.closeForm = () => {
            document.getElementById('service-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('today-date').innerText = dayjs().format('DD/MM/YYYY');
        });
    </script>

    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #f1f5f9; }
        .card { border-radius: 20px; }
        input { border: 2px solid #e2e8f0; border-radius: 14px; padding: 14px; width: 100%; font-size: 16px; }
        .btn-primary { background: #2563eb; color: white; border-radius: 16px; padding: 18px; font-weight: 700; width: 100%; }
        .hidden { display: none; }
        #modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); }
    </style>
</head>
<body class="text-slate-900 pb-10">

    <div id="main-screen" class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-end mb-8 pt-8">
            <div class="text-right">
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">הבריכות שלי</h1>
                <p id="today-date" class="text-blue-600 font-bold"></p>
            </div>
            <button onclick="document.getElementById('modal-overlay').classList.remove('hidden')" class="bg-blue-600 text-white w-14 h-14 rounded-full text-4xl shadow-xl flex items-center justify-center">+</button>
        </header>
        <div id="customer-list"></div>
    </div>

    <div id="modal-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl text-right">
            <h3 class="text-2xl font-bold mb-6">הוספת לקוח חדש</h3>
            <div class="space-y-4">
                <input type="text" id="new_cust_name" placeholder="שם הלקוח">
                <input type="text" id="new_cust_city" placeholder="יישוב">
                <input type="tel" id="new_cust_phone" placeholder="מספר טלפון">
                <button onclick="saveNewCustomer()" class="btn-primary mt-4">שמור וסנכרן</button>
                <button onclick="closeModal()" class="w-full text-slate-400 py-2 font-bold text-center">ביטול</button>
            </div>
        </div>
    </div>

    <div id="service-screen" class="max-w-md mx-auto p-4 hidden text-right">
        <button onclick="closeForm()" class="text-blue-600 font-bold mb-8 flex items-center gap-2">חזרה</button>
        <h2 id="current-customer-name" class="text-3xl font-black mb-10 border-b-4 border-blue-500 inline-block"></h2>
        <div class="space-y-8">
            <div class="bg-blue-600 p-6 rounded-3xl shadow-lg text-right">
                <label class="block text-sm font-bold text-blue-50 mb-3 underline">📅 מועד טיפול הבא:</label>
                <input type="date" id="next_service_date" class="bg-white border-none font-bold text-blue-900">
            </div>
            <button onclick="saveServiceReport()" class="btn-primary shadow-2xl flex items-center justify-center gap-3">
                <span>סיים טיפול ועדכן ענן</span>
            </button>
        </div>
    </div>
</body>
</html>
